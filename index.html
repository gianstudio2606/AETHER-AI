<!DOCTYPE html>
<html lang="id" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aether AI Agent - Cahaya Tanpa Batas</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#050505',
                        glass: 'rgba(255, 255, 255, 0.03)',
                        glassBorder: 'rgba(255, 255, 255, 0.08)',
                        green: {
                            50: '#ecfdf5',
                            100: '#d1fae5',
                            200: '#a7f3d0',
                            300: '#6ee7b7',
                            400: '#34d399',
                            500: '#10b981',
                            600: '#059669',
                            700: '#047857',
                            800: '#065f46',
                            900: '#064e3b',
                        },
                        blue: {
                            50: '#eff6ff',
                            100: '#dbeafe',
                            200: '#bfdbfe',
                            300: '#93c5fd',
                            400: '#60a5fa',
                            500: '#3b82f6',
                            600: '#2563eb',
                            700: '#1d4ed8',
                            800: '#1e40af',
                            900: '#1e3a8a',
                        }
                    },
                    animation: {
                        'pulse-glow': 'pulseGlow 3s ease-in-out infinite',
                        'slide-up': 'slideUp 0.3s ease-out forwards',
                        'popup-in': 'popupIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        'popup-out': 'popupOut 0.3s ease-in forwards',
                        'aurora': 'aurora 12s ease-in-out infinite',
                        'shooting-star': 'shootingStar 4s linear infinite',
                        'twinkle': 'twinkle 2s ease-in-out infinite',
                        'float': 'float 6s ease-in-out infinite',
                    },
                    keyframes: {
                        pulseGlow: {
                            '0%, 100%': { opacity: 1, transform: 'scale(1)', boxShadow: '0 0 25px rgba(16, 185, 129, 0.4)' },
                            '50%': { opacity: .8, transform: 'scale(0.98)', boxShadow: '0 0 15px rgba(16, 185, 129, 0.2)' },
                        },
                        slideUp: {
                            '0%': { opacity: 0, transform: 'translateY(15px)' },
                            '100%': { opacity: 1, transform: 'translateY(0)' },
                        },
                        popupIn: {
                            '0%': { opacity: 0, transform: 'scale(0.5) translateY(20px)' },
                            '100%': { opacity: 1, transform: 'scale(1) translateY(0)' },
                        },
                        popupOut: {
                            '0%': { opacity: 1, transform: 'scale(1) translateY(0)' },
                            '100%': { opacity: 0, transform: 'scale(0.8) translateY(-20px)' },
                        },
                        aurora: {
                            '0%, 100%': { backgroundPosition: '0% 50%' },
                            '50%': { backgroundPosition: '100% 50%' },
                        },
                        shootingStar: {
                            '0%': { transform: 'translateX(0) translateY(0) scale(1)', opacity: 1 },
                            '70%': { opacity: 1 },
                            '100%': { transform: 'translateX(-300px) translateY(300px) scale(0)', opacity: 0 },
                        },
                        twinkle: {
                            '0%, 100%': { opacity: 0.3 },
                            '50%': { opacity: 1 },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-10px)' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- Markdown & Security -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark-dimmed.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.9/purify.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #050505; 
            color: #f3f4f6; 
            overflow: hidden;
            height: 100vh;
            height: 100dvh;
            margin: 0;
            padding: 0;
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
        }

        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.25); }

        .prose { 
            line-height: 1.7; 
            font-size: 14.5px; 
            width: 100%;
            max-width: 100%;
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word; 
        }
        @media (min-width: 768px) { .prose { font-size: 15px; } }
        
        .prose p { margin-bottom: 1em; margin-top: 0; }
        .prose p:last-child { margin-bottom: 0; }
        .prose ul, .prose ol { margin-top: 0.5em; margin-bottom: 1em; padding-left: 1.5em; }
        .prose li { margin-bottom: 0.3em; }
        .prose ul { list-style-type: disc; }
        .prose ol { list-style-type: decimal; }
        .prose h1, .prose h2, .prose h3 { color: #fff; font-weight: 600; margin-top: 1.5em; margin-bottom: 0.7em; line-height: 1.3; }
        .prose h1 { font-size: 1.5em; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.3em; }
        .prose h2 { font-size: 1.3em; }
        .prose h3 { font-size: 1.1em; }
        .prose strong { color: #fff; font-weight: 600; }
        .prose em { font-style: italic; color: #d1d5db; }
        .prose code:not(pre code) { background: rgba(255,255,255,0.1); color: #e5e7eb; padding: 0.2em 0.4em; border-radius: 0.25rem; font-size: 0.85em; font-family: ui-monospace, monospace; }

        .code-block-wrapper { 
            margin: 1.5em 0; 
            border-radius: 0.75rem; 
            overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: #111113; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); 
        }
        .code-header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 0.5rem 1rem; 
            background: #1a1a1d; 
            font-size: 0.75rem; 
            font-family: ui-monospace, monospace; 
            color: #9ca3af; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
        }
        .code-actions {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        .code-btn { 
            display: flex; 
            align-items: center; 
            gap: 0.3rem; 
            padding: 0.3rem 0.6rem; 
            border-radius: 0.375rem; 
            transition: all 0.2s; 
            cursor: pointer; 
            background: rgba(255,255,255,0.05); 
            border: none; 
            color: #e5e7eb;
            font-size: 0.7rem;
        }
        .code-btn:hover { 
            background: rgba(255,255,255,0.1); 
            color: #fff; 
        }
        .code-btn.preview-btn {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
        }
        .code-btn.preview-btn:hover {
            background: rgba(16, 185, 129, 0.3);
        }
        .code-btn.copy-btn {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }
        .code-btn.copy-btn:hover {
            background: rgba(59, 130, 246, 0.3);
        }
        .code-block-wrapper pre { 
            margin: 0; 
            padding: 1rem; 
            overflow-x: auto; 
            font-size: 13px; 
            background: transparent !important; 
        }
        .code-block-wrapper pre code {
            white-space: pre;
            tab-size: 2;
        }
        
        .glass-panel { background: rgba(15, 15, 17, 0.75); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255, 255, 255, 0.06); }
        .chat-container { scroll-behavior: smooth; }
        
        .bubble-user { 
            background: linear-gradient(135deg, #10b981, #059669); 
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2); 
        }
        .bubble-ai { 
            background: rgba(25, 25, 28, 0.8); 
            border: 1px solid rgba(255,255,255,0.08); 
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); 
        }
        .bubble-ai.pro-mode {
            border-color: rgba(59, 130, 246, 0.3);
        }

        .download-box { 
            background: linear-gradient(to right, rgba(16, 185, 129, 0.05), transparent); 
            border: 1px solid rgba(16, 185, 129, 0.2); 
            border-radius: 0.75rem; 
            padding: 0.875rem; 
            margin-top: 1rem; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            transition: all 0.3s; 
            cursor: pointer;
        }
        .download-box:hover { 
            border-color: rgba(16, 185, 129, 0.5); 
            background: linear-gradient(to right, rgba(16, 185, 129, 0.1), rgba(255,255,255,0.02)); 
            transform: translateY(-1px); 
        }
        
        #user-input { 
            line-height: 1.5; 
            padding-top: 0.875rem; 
            padding-bottom: 0.875rem;
            min-height: 48px;
            max-height: 30vh;
        }
        
        .typing-cursor::after { content: '▋'; animation: blink 1s step-start infinite; color: #c084fc; margin-left: 2px; }
        @keyframes blink { 50% { opacity: 0; } }
        .thinking-dots::after { content: ''; animation: thinking 1.5s infinite; }
        @keyframes thinking { 0% { content: ''; } 25% { content: '.'; } 50% { content: '..'; } 75% { content: '...'; } 100% { content: ''; } }

        .history-item .del-btn { opacity: 0; transform: scale(0.9); transition: all 0.2s; }
        .history-item:hover .del-btn { opacity: 1; transform: scale(1); }
        @media (max-width: 768px) { .history-item .del-btn { opacity: 1; transform: scale(1); } }

        .app-wrapper { 
            height: 100vh; 
            height: 100dvh; 
            display: flex; 
            flex-direction: row; 
            overflow: hidden; 
            width: 100%; 
            position: fixed;
            top: 0;
            left: 0;
        }
        .main-content { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            min-width: 0; 
            position: relative;
            height: 100vh;
            height: 100dvh;
        }
        #chat-container { 
            flex: 1; 
            overflow-y: auto; 
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }
        .input-wrapper-safe { 
            padding-bottom: max(0.75rem, env(safe-area-inset-bottom)); 
            background: #080809;
            flex-shrink: 0;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .toast-container {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            pointer-events: none;
        }
        @media (min-width: 768px) {
            .toast-container {
                bottom: 120px;
            }
        }
        .toast-item {
            pointer-events: auto;
            background: rgba(20, 20, 25, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 16px;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8), 0 0 40px rgba(16, 185, 129, 0.15);
            animation: popupIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            min-width: 280px;
            max-width: 90vw;
        }
        .toast-item.hide {
            animation: popupOut 0.3s ease-in forwards;
        }
        .toast-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .toast-icon.green {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.3), rgba(6, 148, 105, 0.1));
        }
        .toast-icon.blue {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.3), rgba(37, 99, 235, 0.1));
        }
        .toast-icon svg {
            width: 20px;
            height: 20px;
        }
        .toast-icon.green svg { color: #34d399; }
        .toast-icon.blue svg { color: #60a5fa; }
        .toast-content {
            flex: 1;
        }
        .toast-title {
            font-weight: 600;
            color: #fff;
            font-size: 14px;
            margin-bottom: 2px;
        }
        .toast-sub {
            color: #9ca3af;
            font-size: 12px;
        }
        .toast-close {
            background: rgba(255,255,255,0.05);
            border: none;
            color: #6b7280;
            padding: 4px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .toast-close:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .toast-close svg {
            width: 16px;
            height: 16px;
        }

        #chat-form {
            background: #0a0a0c;
            border: 1px solid rgba(255,255,255,0.08);
        }
        #chat-form:focus-within {
            border-color: rgba(16, 185, 129, 0.5);
            box-shadow: 0 0 25px rgba(16, 185, 129, 0.1);
        }
        #chat-form.pro-mode:focus-within {
            border-color: rgba(59, 130, 246, 0.5);
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.1);
        }
        textarea {
            font-size: 16px !important;
        }

        /* Aurora Background */
        .aurora-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: linear-gradient(135deg, #10b981 0%, #059669 25%, #047857 50%, #064e3b 75%, #10b981 100%);
            background-size: 300% 300%;
            animation: aurora 12s ease-in-out infinite;
            opacity: 0.3;
        }
        .aurora-bg.pro-mode {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 25%, #1d4ed8 50%, #1e40af 75%, #3b82f6 100%);
            background-size: 300% 300%;
            animation: aurora 12s ease-in-out infinite;
            opacity: 0.3;
        }
        
        /* Stars */
        .stars-container {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
        }
        .shooting-star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: shootingStar var(--duration) linear infinite;
            box-shadow: 0 0 6px 2px rgba(255,255,255,0.3);
        }
        .shooting-star::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 80px;
            height: 1px;
            background: linear-gradient(to left, rgba(255,255,255,0.8), transparent);
            transform: rotate(0deg) translateX(0);
        }

        .aurora-overlay {
            position: relative;
            z-index: 1;
            background: radial-gradient(ellipse at 50% 50%, rgba(16, 185, 129, 0.05), transparent 70%);
        }
        .aurora-overlay.pro-mode {
            background: radial-gradient(ellipse at 50% 50%, rgba(59, 130, 246, 0.05), transparent 70%);
        }

        /* Preview Modal */
        .preview-modal {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            display: none;
            flex-direction: column;
            animation: popupIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        .preview-modal.active {
            display: flex;
        }
        .preview-header {
            padding: 1rem 1.5rem;
            background: rgba(0,0,0,0.5);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .preview-body {
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        .preview-body iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
        .preview-close {
            padding: 0.5rem 1rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 0.5rem;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .preview-close:hover {
            background: rgba(255,255,255,0.2);
        }

        .mode-btn {
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .mode-btn.active-green {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.3);
        }
        .mode-btn.active-blue {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
        }
        .mode-btn.inactive {
            background: rgba(255,255,255,0.05);
            color: #9ca3af;
        }
        .mode-btn.inactive:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
        .status-dot.green { background: #34d399; box-shadow: 0 0 10px rgba(52, 211, 153, 0.5); }
        .status-dot.blue { background: #60a5fa; box-shadow: 0 0 10px rgba(96, 165, 250, 0.5); }

        /* Submit button stop state */
        .submit-btn-stop {
            background: linear-gradient(135deg, #ef4444, #dc2626) !important;
            animation: pulse-red 1s ease-in-out infinite;
        }
        .submit-btn-stop:hover {
            background: linear-gradient(135deg, #dc2626, #b91c1c) !important;
        }
        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 20px rgba(239, 68, 68, 0.3); }
            50% { box-shadow: 0 0 40px rgba(239, 68, 68, 0.6); }
        }
    </style>
</head>
<body>

    <!-- Aurora Background -->
    <div class="aurora-bg" id="aurora-bg"></div>
    
    <!-- Stars & Shooting Stars -->
    <div class="stars-container" id="stars-container"></div>

    <div class="app-wrapper aurora-overlay" id="app-wrapper">

        <!-- Overlay -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/80 z-40 hidden lg:hidden backdrop-blur-sm transition-opacity" onclick="toggleSidebar()"></div>

        <!-- Sidebar -->
        <aside id="sidebar" class="fixed lg:static w-[280px] lg:w-[300px] h-full glass-panel border-r border-glassBorder flex flex-col z-50 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 shadow-2xl lg:shadow-none">
            <div class="p-5 flex items-center justify-between border-b border-glassBorder">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 rounded-xl bg-gradient-to-br from-green-500 to-green-700 flex items-center justify-center shadow-lg shadow-green-500/30" id="sidebar-logo">
                        <i data-lucide="sparkles" class="w-5 h-5 text-white"></i>
                    </div>
                    <h1 class="text-xl font-bold tracking-widest text-white">AETHER</h1>
                </div>
                <button onclick="toggleSidebar()" class="lg:hidden text-gray-400 hover:text-white p-2 rounded-lg hover:bg-white/10 transition">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <div class="p-4">
                <button onclick="startNewChat()" class="w-full flex items-center justify-center gap-2 px-4 py-3 bg-white/5 hover:bg-white/10 border border-white/10 rounded-xl transition-all group shadow-sm hover:shadow-md" id="new-chat-btn">
                    <i data-lucide="plus" class="w-5 h-5 text-gray-400 group-hover:text-white transition-colors"></i>
                    <span class="font-medium text-gray-200 group-hover:text-white">Chat Baru</span>
                </button>
            </div>

            <div class="flex-1 overflow-y-auto px-3 pb-4 space-y-1 custom-scrollbar" id="chat-history-list"></div>
            
            <div class="p-4 border-t border-glassBorder">
                <div class="flex items-center gap-2 text-xs text-gray-500">
                    <span class="status-dot green" id="status-dot"></span>
                    <span id="status-text">Mode Biasa</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="flex-none h-14 lg:h-16 flex items-center justify-between px-4 lg:px-6 glass-panel border-b border-glassBorder z-10">
                <div class="flex items-center gap-3 min-w-0">
                    <button onclick="toggleSidebar()" class="lg:hidden text-gray-400 hover:text-white p-1.5 rounded-lg hover:bg-white/10 transition">
                        <i data-lucide="menu" class="w-5 h-5"></i>
                    </button>
                    <div class="flex flex-col min-w-0">
                        <h2 class="font-semibold text-white text-[13px] lg:text-base leading-tight truncate">Aether AI Agent</h2>
                        <span class="text-[10px] lg:text-xs text-green-400 font-mono tracking-wider truncate" id="model-status">Llama 3.3 70B Abliterated</span>
                    </div>
                </div>

                <div class="flex items-center p-1 bg-black/40 border border-white/5 rounded-xl shadow-inner flex-shrink-0 ml-2">
                    <button onclick="setMode('biasa')" id="btn-mode-biasa" class="mode-btn px-2.5 lg:px-3 py-1.5 text-[11px] lg:text-sm rounded-lg transition-all active-green">
                        <i data-lucide="leaf" class="w-3 h-3 inline mr-1"></i>
                        Biasa
                    </button>
                    <button onclick="setMode('pro')" id="btn-mode-pro" class="mode-btn px-2.5 lg:px-3 py-1.5 text-[11px] lg:text-sm rounded-lg transition-all inactive">
                        <i data-lucide="code" class="w-3 h-3 inline mr-1"></i>
                        Pro Code
                    </button>
                </div>

        function renderMarkdown(content) {
            const html = marked.parse(content);
            const sanitized = DOMPurify.sanitize(html, {
                ADD_TAGS: ['svg', 'path', 'button', 'div'],
                ADD_ATTR: ['class', 'style', 'xmlns', 'viewBox', 'd', 'fill', 'stroke', 'onclick']
            });
            
            let processed = sanitized;
            
            // Process code blocks and add buttons
            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = processed;
            
            // Find all pre > code blocks
            const codeBlocks = tempDiv.querySelectorAll('pre code');
            codeBlocks.forEach(block => {
                const pre = block.parentElement;
                const wrapper = document.createElement('div');
                wrapper.className = 'code-block-wrapper';
                
                const lang = block.className.replace('language-', '') || 'plaintext';
                const codeContent = block.textContent;
                const isHtml = lang === 'html' || codeContent.includes('<!DOCTYPE html>') || codeContent.includes('<html');
                
                const header = document.createElement('div');
                header.className = 'code-header';
                header.innerHTML = `
                    <span>📄 ${lang.toUpperCase()}</span>
                    <div class="code-actions">
                        ${isHtml ? `<button class="code-btn preview-btn" onclick="previewHTML(\`${encodeURIComponent(codeContent)}\`)">
                            <i data-lucide="eye" class="w-3 h-3"></i> Preview
                        </button>` : ''}
                        <button class="code-btn copy-btn" onclick="copyCode(this, \`${encodeURIComponent(codeContent)}\`)">
                            <i data-lucide="copy" class="w-3 h-3"></i> Copy
                        </button>
                    </div>
                `;
                
                wrapper.appendChild(header);
                wrapper.appendChild(pre.cloneNode(true));
                pre.parentElement.replaceChild(wrapper, pre);
            });
            
            // Process [FILE: ...] tags
            const fileRegex = /\[FILE:\s*([^\]]+)\]/g;
            let match;
            let tempContent = tempDiv.innerHTML;
            while ((match = fileRegex.exec(tempContent)) !== null) {
                const file = match[1].trim();
                const filePattern = `[FILE: ${file}]`;
                const downloadHtml = `
                    <div class="download-box" onclick="downloadFile('${file}')">
                        <div class="flex items-center gap-3">
                            <i data-lucide="file-code" class="w-5 h-5 text-green-400"></i>
                            <span class="text-sm text-white font-medium">📁 ${file}</span>
                        </div>
                        <div class="flex items-center gap-2 text-green-400">
                            <span class="text-xs">Download</span>
                            <i data-lucide="download" class="w-4 h-4"></i>
                        </div>
                    </div>
                `;
                tempContent = tempContent.replace(filePattern, downloadHtml);
            }
            
            return tempContent;
        }

        function previewHTML(encodedContent) {
            const content = decodeURIComponent(encodedContent);
            const modal = document.getElementById('preview-modal');
            const frame = document.getElementById('preview-frame');
            
            frame.srcdoc = content;
            modal.classList.add('active');
            
            showToast('👁️ Preview HTML', 'Menampilkan preview halaman HTML', 'eye', 'blue');
        }

        function closePreview() {
            const modal = document.getElementById('preview-modal');
            modal.classList.remove('active');
            document.getElementById('preview-frame').srcdoc = '';
        }

        function copyCode(btn, encodedContent) {
            const content = decodeURIComponent(encodedContent);
            navigator.clipboard.writeText(content).then(() => {
                const originalHtml = btn.innerHTML;
                btn.innerHTML = '<i data-lucide="check" class="w-3 h-3"></i> Copied!';
                lucide.createIcons();
                setTimeout(() => {
                    btn.innerHTML = originalHtml;
                    lucide.createIcons();
                }, 2000);
                showToast('📋 Code Copied', 'Kode berhasil disalin ke clipboard', 'copy', 'green');
            }).catch(() => {
                showToast('❌ Gagal Copy', 'Terjadi kesalahan saat menyalin', 'alert-circle', 'green');
            });
        }

        function downloadFile(filename) {
            const container = document.getElementById('chat-container');
            const codeBlocks = container.querySelectorAll('pre code');
            let found = false;
            
            codeBlocks.forEach(block => {
                const parent = block.closest('.code-block-wrapper');
                if (parent) {
                    const wrapper = parent.parentElement;
                    if (wrapper) {
                        const text = wrapper.textContent;
                        if (text.includes(`[FILE: ${filename}]`)) {
                            const content = block.textContent;
                            const blob = new Blob([content], { type: 'text/plain' });
                            const url = URL.createObjectURL(blob);
                            const a = document.createElement('a');
                            a.href = url;
                            a.download = filename;
                            document.body.appendChild(a);
                            a.click();
                            document.body.removeChild(a);
                            URL.revokeObjectURL(url);
                            found = true;
                            showToast('✅ Download Berhasil', `File ${filename} siap digunakan`, 'download', 'green');
                        }
                    }
                }
            });
            
            if (!found) {
                showToast('⚠️ File Tidak Ditemukan', `File ${filename} tidak ditemukan dalam chat`, 'alert-circle', 'green');
            }
        }

        // --- STOP CHAT FUNCTION ---
        function stopChat() {
            if (abortController) {
                abortController.abort();
                abortController = null;
                isGenerating = false;
                
                // Kembalikan tombol ke mode kirim
                const submitBtn = document.getElementById('submit-btn');
                const icon = submitBtn.querySelector('i');
                submitBtn.disabled = true;
                submitBtn.className = 'p-2.5 md:p-3 rounded-xl text-white transition-all disabled:opacity-20 disabled:bg-gray-600 disabled:cursor-not-allowed flex items-center justify-center min-w-[44px] min-h-[44px] bg-gradient-to-r from-green-500 to-green-600 hover:from-green-600 hover:to-green-700';
                submitBtn.innerHTML = '<i data-lucide="send" class="w-5 h-5 ml-0.5"></i>';
                lucide.createIcons();
                
                // Hapus typing indicator
                const typingEl = document.querySelector('[id^="typing-"]');
                if (typingEl) typingEl.remove();
                
                showToast('⏹️ Chat Dihentikan', 'Generasi dihentikan oleh pengguna', 'stop-circle', 'green');
                
                // Enable input
                document.getElementById('user-input').disabled = false;
            }
        }

        // --- UPDATE SUBMIT BUTTON TO STOP ---
        function updateSubmitButtonToStop() {
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.className = 'p-2.5 md:p-3 rounded-xl text-white transition-all flex items-center justify-center min-w-[44px] min-h-[44px] submit-btn-stop';
            submitBtn.innerHTML = '<i data-lucide="square" class="w-5 h-5"></i>';
            submitBtn.disabled = false;
            submitBtn.onclick = function(e) {
                e.preventDefault();
                stopChat();
            };
            lucide.createIcons();
        }

        // --- RESET SUBMIT BUTTON ---
        function resetSubmitButton() {
            const submitBtn = document.getElementById('submit-btn');
            const isPro = currentMode === 'pro';
            submitBtn.className = `p-2.5 md:p-3 rounded-xl text-white transition-all disabled:opacity-20 disabled:bg-gray-600 disabled:cursor-not-allowed flex items-center justify-center min-w-[44px] min-h-[44px] ${isPro ? 'bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700' : 'bg-gradient-to-r from-green-500 to-green-600 hover:from-green-600 hover:to-green-700'}`;
            submitBtn.innerHTML = '<i data-lucide="send" class="w-5 h-5 ml-0.5"></i>';
            submitBtn.disabled = true;
            submitBtn.onclick = null;
            lucide.createIcons();
        }

        // --- HANDLE SUBMIT ---
        async function handleSubmit(e) {
            e.preventDefault();
            const input = document.getElementById('user-input');
            const text = input.value.trim();
            if (!text || isGenerating) return;
            
            // Save to session
            if (!sessions[currentSessionId]) {
                sessions[currentSessionId] = { messages: [], title: text.substring(0, 50) };
            }
            
            // Add user message
            sessions[currentSessionId].messages.push({ role: 'user', content: text });
            localStorage.setItem('aether_sessions', JSON.stringify(sessions));
            
            addMessage('user', text);
            input.value = '';
            input.style.height = 'auto';
            localStorage.removeItem('aether_draft');
            document.getElementById('submit-btn').disabled = true;
            
            // Show typing indicator
            const typingId = showTypingIndicator();
            
            // Ubah tombol menjadi STOP
            updateSubmitButtonToStop();
            isGenerating = true;
            abortController = new AbortController();
            
            try {
                const messages = [
                    { role: 'system', content: SYSTEM_PROMPT },
                    ...sessions[currentSessionId].messages
                ];
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: messages,
                        temperature: currentMode === 'pro' ? 0.2 : 0.8,
                        max_tokens: currentMode === 'pro' ? 4096 : 2048,
                        stream: false
                    }),
                    signal: abortController.signal
                });
                
                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }
                
                const data = await response.json();
                const content = data.choices[0].message.content;
                
                // Remove typing indicator
                removeTypingIndicator(typingId);
                
                // Add AI response
                sessions[currentSessionId].messages.push({ role: 'assistant', content });
                localStorage.setItem('aether_sessions', JSON.stringify(sessions));
                
                addMessage('assistant', content);
                
                // Update session title if first message
                if (sessions[currentSessionId].messages.length === 2) {
                    sessions[currentSessionId].title = text.substring(0, 50);
                    renderHistory();
                }
                
            } catch (error) {
                if (error.name === 'AbortError') {
                    // Sudah ditangani di stopChat
                } else {
                    console.error('Error:', error);
                    showToast('❌ Error', 'Terjadi kesalahan. Coba lagi nanti.', 'alert-circle', 'green');
                    addMessage('assistant', 'Maaf, terjadi kesalahan. Silakan coba lagi.');
                }
            }
            
            isGenerating = false;
            abortController = null;
            resetSubmitButton();
            document.getElementById('submit-btn').disabled = true;
            document.getElementById('user-input').disabled = false;
        }

        function showTypingIndicator() {
            const container = document.getElementById('chat-container');
            const welcome = document.getElementById('welcome-screen');
            if (welcome) welcome.style.display = 'none';
            
            const id = 'typing-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = 'flex justify-start animate-slide-up';
            div.innerHTML = `
                <div class="bubble-ai rounded-2xl px-4 py-3 md:px-5 md:py-4 flex items-center gap-2 ${currentMode === 'pro' ? 'pro-mode' : ''}">
                    <span class="text-gray-400 text-sm">Aether Agent sedang berpikir</span>
                    <span class="thinking-dots text-gray-400 text-sm"></span>
                </div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return id;
        }

        function removeTypingIndicator(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function handleFileUpload(e) {
            const files = e.target.files;
            const preview = document.getElementById('attachment-preview');
            
            if (files.length > 0) {
                preview.classList.remove('hidden');
                preview.innerHTML = '';
                
                Array.from(files).forEach(file => {
                    const div = document.createElement('div');
                    div.className = 'flex items-center gap-2 bg-white/5 px-3 py-2 rounded-lg border border-white/10';
                    div.innerHTML = `
                        <i data-lucide="file" class="w-4 h-4 text-gray-400"></i>
                        <span class="text-xs text-gray-300 truncate max-w-[100px]">${file.name}</span>
                        <span class="text-[10px] text-gray-500">(${(file.size / 1024).toFixed(0)}KB)</span>
                        <button onclick="this.closest('.flex').remove(); if(document.getElementById('attachment-preview').children.length === 0) document.getElementById('attachment-preview').classList.add('hidden')" class="text-gray-500 hover:text-red-400 transition-colors">
                            <i data-lucide="x" class="w-3 h-3"></i>
                        </button>
                    `;
                    preview.appendChild(div);
                });
                
                lucide.createIcons();
            } else {
                preview.classList.add('hidden');
            }
        }

        document.addEventListener('touchend', function(e) {
            const now = Date.now();
            if (now - (document.lastTouch || 0) < 300) {
                e.preventDefault();
            }
            document.lastTouch = now;
        }, { passive: false });
    </script>
</body>
