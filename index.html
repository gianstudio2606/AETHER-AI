    <script>

ATURAN UTAMA:

        // --- STATE ---
        let currentSessionId = Date.now().toString();

            lucide.createIcons();

                highlight: function(code, lang) {
                    const language = hljs.getLanguage(lang) ? lang : 'plaintext';
                    return hljs.highlight(code, { language }).value;
                },
                breaks: true,
                gfm: true
            });

            const tx = document.getElementById('user-input');
            const submitBtn = document.getElementById('submit-btn');

            const savedDraft = localStorage.getItem('aether_draft');
            if (savedDraft) {
                tx.value = savedDraft;
                submitBtn.disabled = savedDraft.trim() === '';
            }

            tx.addEventListener("input", function() {
                this.style.height = 'auto';
                let newHeight = this.scrollHeight;
                const maxHeight = window.innerHeight * 0.30; 
                if (newHeight > maxHeight) {
                    this.style.height = maxHeight + 'px';
                    this.style.overflowY = 'auto';
                } else {
                    this.style.height = Math.max(newHeight, 48) + 'px';
                    this.style.overflowY = 'hidden';
                }
                localStorage.setItem('aether_draft', this.value);
                submitBtn.disabled = this.value.trim() === '';
            }, false);

            if (!sessions[currentSessionId]) {
                sessions[currentSessionId] = { title: "Chat Baru", messages: [], date: new Date().toISOString() };
            }
            
            updateSidebar();
            if(sessions[currentSessionId].messages.length > 0) {
                document.getElementById('welcome-screen').style.display = 'none';
                renderCurrentMessages();

            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');

            currentMode = mode;
            ['biasa', 'pro'].forEach(m => {
                document.getElementById(`btn-mode-${m}`).className = m === mode 
                    ? "px-2.5 lg:px-3 py-1.5 text-[11px] lg:text-sm rounded-lg transition-all bg-white/10 text-white shadow-sm font-medium"

        }

        function setInput(text) {
            const input = document.getElementById('user-input');
            input.value = text;
            input.dispatchEvent(new Event('input'));
            input.focus();
        }

        let isScrolling = false;
        function scrollToBottom() {
            const container = document.getElementById('chat-container');
            if(!isScrolling) container.scrollTop = container.scrollHeight;
        }
        
        document.getElementById('chat-container').addEventListener('wheel', () => isScrolling = true, {passive: true});
        document.getElementById('chat-container').addEventListener('touchmove', () => isScrolling = true, {passive: true});
        setInterval(() => {
            const container = document.getElementById('chat-container');
            if(container.scrollHeight - container.scrollTop <= container.clientHeight + 150) isScrolling = false;
        }, 1000);

        // --- FILE HANDLING ---
        document.getElementById('file-upload').addEventListener('change', async function(e) {
            const files = Array.from(e.target.files);
            const preview = document.getElementById('attachment-preview');
            
            for (let file of files) {
                const isText = file.type.startsWith('text/') || file.type === 'application/json' || file.name.match(/\.(js|py|html|css|md|csv)$/i);
                let contentText = "";
                if (isText) {
                    try {
                        contentText = await file.text();
                        contentText = `\n\n--- ISI FILE: ${file.name} ---\n${contentText}\n--- AKHIR ISI FILE ---\n`;
                    } catch(err) {
                        contentText = `[Sistem: Gagal membaca file ${file.name}]`;
                    }
                } else {
                    contentText = `\n[Sistem: Pengguna melampirkan file visual bernama ${file.name}. Analisis berdasarkan deskripsi saja.]\n`;
                }

                const fileId = 'file-' + Date.now() + Math.floor(Math.random() * 1000);
                attachedFiles.push({ id: fileId, name: file.name, parsedContent: contentText });
                
                const fileEl = document.createElement('div');
                fileEl.id = fileId;
                fileEl.className = 'flex items-center gap-1.5 bg-[#1a1a1d] px-3 py-1.5 rounded-lg text-xs text-white border border-white/10 whitespace-nowrap flex-shrink-0 shadow-sm';

                `;
                preview.appendChild(fileEl);
            }
            if(attachedFiles.length > 0) preview.classList.remove('hidden');
            lucide.createIcons();
            this.value = '';
        });

        function removeFile(fileId) {
            attachedFiles = attachedFiles.filter(f => f.id !== fileId);
            document.getElementById(fileId)?.remove();
            if(attachedFiles.length === 0) document.getElementById('attachment-preview').classList.add('hidden');
        }

        function startNewChat() {
            if(isGenerating && abortController) abortController.abort();

            sessions[currentSessionId] = { title: "Chat Baru", messages: [], date: new Date().toISOString() };

                    </div>
                    <h2 class="text-2xl lg:text-4xl font-bold text-white mb-3 tracking-tight">Cahaya Tanpa Batas.</h2>
                    <p class="text-gray-400 text-sm lg:text-base mb-8 max-w-lg leading-relaxed">Dewa pengetahuan tanpa filter. Tidak ada yang disensor, tidak ada yang ditolak.</p>
                </div>
            `;
            lucide.createIcons();
            if(window.innerWidth < 1024) toggleSidebar();
            document.getElementById('user-input').focus();
        }

        function loadSession(id) {
            if(isGenerating && abortController) abortController.abort();
            currentSessionId = id;
            document.getElementById('welcome-screen')?.remove();
            renderCurrentMessages();
            updateSidebar();
            if(window.innerWidth < 1024) toggleSidebar();
        }

        function deleteSession(id, event) {
            event.stopPropagation();
            if(confirm("Hapus percakapan ini secara permanen?")) {
                delete sessions[id];
                saveSessions();
                if(id === currentSessionId) startNewChat();
                else updateSidebar();
            }
        }

        function saveSessions() { localStorage.setItem('aether_sessions', JSON.stringify(sessions)); }

        function updateSidebar() {
            const list = document.getElementById('chat-history-list');
            list.innerHTML = '';
            const sortedIds = Object.keys(sessions).sort((a, b) => new Date(sessions[b].date) - new Date(sessions[a].date));
            
            sortedIds.forEach(id => {
                if(sessions[id].messages.length === 0 && id !== currentSessionId) return;
                const btn = document.createElement('div');
                const isActive = id === currentSessionId;
                btn.className = `history-item w-full flex items-center justify-between px-3 py-2.5 rounded-xl text-sm transition-all duration-200 cursor-pointer ${isActive ? 'bg-primary/20 text-white font-medium border border-primary/30 shadow-inner' : 'text-gray-400 hover:bg-white/5 hover:text-gray-200 border border-transparent'}`;
                
                const icon = isActive ? '<i data-lucide="message-square" class="w-4 h-4 text-primaryLight shrink-0"></i>' : '<i data-lucide="message-square" class="w-4 h-4 shrink-0 opacity-60"></i>';
                
                btn.innerHTML = `
                    <div class="flex items-center gap-2.5 overflow-hidden flex-1" onclick="loadSession('${id}')">
                        ${icon} <span class="truncate pt-0.5">${sessions[id].title}</span>
                    </div>
                    <button onclick="deleteSession('${id}', event)" class="del-btn text-gray-500 hover:text-red-400 p-1 rounded-md hover:bg-black/30"><i data-lucide="trash-2" class="w-3.5 h-3.5"></i></button>
                `;
                list.appendChild(btn);
            });
            lucide.createIcons();
        }

        function renderCurrentMessages() {
            const container = document.getElementById('chat-container');
            container.innerHTML = '';
            sessions[currentSessionId].messages.forEach(msg => {
                if(msg.role !== 'system') renderStaticMessage(msg.role, msg.content);
            });
            scrollToBottom();
        }

        // --- API & STREAMING ---
        document.getElementById('chat-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if(isGenerating) {
                if(abortController) abortController.abort();
                isGenerating = false;
                resetSubmitButton();
                return;
            }

            const inputEl = document.getElementById('user-input');
            let rawText = inputEl.value; 
            let trimmedText = rawText.trim();
            if (!trimmedText) return;

            localStorage.removeItem('aether_draft');
            inputEl.value = '';
            inputEl.style.height = 'auto'; // Reset height
            
            if(window.innerWidth < 768) inputEl.blur(); 

            document.getElementById('welcome-screen')?.remove();
            
            let finalUserInput = rawText;
            if (attachedFiles.length > 0) {
                let allFileContents = attachedFiles.map(f => f.parsedContent).join('');
                finalUserInput = `${rawText}\n\n[INFORMASI TAMBAHAN DARI PENGGUNA:]${allFileContents}`;
                attachedFiles = [];
                document.getElementById('attachment-preview').innerHTML = '';
                document.getElementById('attachment-preview').classList.add('hidden');
            }

            sessions[currentSessionId].messages.push({ role: 'user', content: finalUserInput });
            sessions[currentSessionId].date = new Date().toISOString(); 
            
            if (sessions[currentSessionId].messages.length === 1 || sessions[currentSessionId].title === "Chat Baru") {
                const titleText = trimmedText.replace(/\n/g, ' ').substring(0, 30);
                sessions[currentSessionId].title = titleText + (trimmedText.length > 30 ? '...' : '');
            }
            saveSessions();
            updateSidebar();

            renderStaticMessage('user', rawText, true);
            await streamAIResponse();
        });

        async function streamAIResponse() {
            isGenerating = true;
            isScrolling = false;
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.innerHTML = `<i data-lucide="square" class="w-4 h-4 text-red-400 fill-red-400"></i>`;
            submitBtn.disabled = false;
            lucide.createIcons();

            let apiMessages = [{ role: 'system', content: SYSTEM_PROMPT }];
            if (currentMode === 'pro') apiMessages[0].content += "\nMODE SAAT INI: Pro Code. Sangat detail teknikal, langsung ke kodenya.";

            const history = sessions[currentSessionId].messages;
            const contextMessages = history.length > 15 ? history.slice(-15) : history;
            apiMessages = apiMessages.concat(contextMessages);

            abortController = new AbortController();
            const msgId = 'msg-' + Date.now();
            const container = document.getElementById('chat-container');
            
            const initialHtml = `
            <div class="flex gap-3 md:gap-4 w-full max-w-4xl mx-auto opacity-0 translate-y-4 transition-all duration-300 min-w-0" id="${msgId}">
                <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-primary/30 to-purple-800/40 flex-shrink-0 flex items-center justify-center shadow-lg border border-primary/20 mt-1">
                    <i data-lucide="sparkles" class="w-4 h-4 text-primaryLight"></i>
                </div>
                <div class="flex-1 min-w-0 bubble-ai rounded-2xl rounded-tl-none p-4 shadow-xl">
                    <div id="loading-state-${msgId}" class="text-xs text-primaryLight font-medium tracking-wide flex items-center">
                        <i data-lucide="loader-2" class="w-4 h-4 mr-2 animate-spin"></i> Aether sedang memproses<span class="thinking-dots"></span>
                    </div>
                    <div id="content-${msgId}" class="prose prose-invert max-w-none hidden typing-cursor w-full"></div>
                </div>
            </div>`;
            container.insertAdjacentHTML('beforeend', initialHtml);
            lucide.createIcons();
            
            requestAnimationFrame(() => {
                document.getElementById(msgId).classList.remove('opacity-0', 'translate-y-4');
                scrollToBottom();
            });

            let accumulatedText = "";
            const contentDiv = document.getElementById(`content-${msgId}`);
            const loadingDiv = document.getElementById(`loading-state-${msgId}`);
            const assistantMsgIndex = sessions[currentSessionId].messages.length;
            sessions[currentSessionId].messages.push({ role: 'assistant', content: "" });

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${API_KEY}` },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: apiMessages,
                        max_tokens: 8192,
                        temperature: 0.3, // Sangat rendah agar AI sangat patuh tidak basa-basi
                        stream: true
                    }),
                    signal: abortController.signal
                });

                if (!response.ok) throw new Error(`API Error: ${response.status}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let firstChunkReceived = false;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.trim().startsWith('data: ')) {
                            const dataStr = line.slice(6).trim();
                            if (dataStr === '[DONE]') break;
                            
                            try {
                                const data = JSON.parse(dataStr);
                                if (data.choices[0].delta && data.choices[0].delta.content) {
                                    
                                    if(!firstChunkReceived) {
                                        loadingDiv.remove();
                                        contentDiv.classList.remove('hidden');
                                        firstChunkReceived = true;
                                    }

                                    accumulatedText += data.choices[0].delta.content;
                                    let rawHtml = marked.parse(accumulatedText);
                                    contentDiv.innerHTML = DOMPurify.sanitize(rawHtml, { ADD_TAGS: ['code', 'pre', 'span'], ADD_ATTR: ['class'] });
                                    scrollToBottom();
                                    
                                    sessions[currentSessionId].messages[assistantMsgIndex].content = accumulatedText;
                                    if(accumulatedText.length % 60 === 0) saveSessions(); 
                                }
                            } catch (e) { }
                        }
                    }
                }

            } catch (error) {
                if(!loadingDiv.classList.contains('hidden')) loadingDiv.remove();
                contentDiv.classList.remove('hidden');
                if (error.name === 'AbortError') accumulatedText += "\n\n*[Berhenti]*";
                else accumulatedText += `\n\n**[SISTEM ERROR]** Terputus.`;
                contentDiv.innerHTML = DOMPurify.sanitize(marked.parse(accumulatedText), { ADD_TAGS: ['code', 'pre', 'span'], ADD_ATTR: ['class'] });
            } finally {
                contentDiv.classList.remove('typing-cursor');
                sessions[currentSessionId].messages[assistantMsgIndex].content = accumulatedText;
                saveSessions();
                postProcessMessage(contentDiv, accumulatedText, msgId);
                resetSubmitButton();
                isGenerating = false;
                scrollToBottom();
            }
        }

        function resetSubmitButton() {
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = document.getElementById('user-input').value.trim() === '';
            submitBtn.innerHTML = `<i data-lucide="send" class="w-5 h-5 ml-0.5"></i>`;
            lucide.createIcons();
        }

        // --- RENDERERS ---
        function renderStaticMessage(role, content, animate = false) {
            const container = document.getElementById('chat-container');
            const msgId = 'msg-' + Date.now() + Math.random().toString(36).substr(2, 5);
            let html = '';
            
            if (role === 'user') {
                let displayContent = content.split('\n\n[INFORMASI TAMBAHAN')[0];
                html = `
                <div class="flex w-full justify-end ${animate ? 'animate-slide-up' : ''}" id="${msgId}">
                    <div class="bubble-user text-white rounded-2xl rounded-tr-sm px-4 py-3 max-w-[90%] md:max-w-[75%] break-words whitespace-pre-wrap text-[14px] md:text-[15px] leading-relaxed">${escapeHtml(displayContent)}</div>
                </div>`;
            } else {
                html = `
                <div class="flex gap-3 md:gap-4 w-full max-w-4xl mx-auto min-w-0 ${animate ? 'animate-slide-up' : ''}" id="${msgId}">
                    <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-primary/30 to-purple-800/40 flex-shrink-0 flex items-center justify-center shadow-lg border border-primary/20 mt-1">
                        <i data-lucide="sparkles" class="w-4 h-4 text-primaryLight"></i>
                    </div>
                    <div class="flex-1 min-w-0 bubble-ai rounded-2xl rounded-tl-sm p-4 shadow-xl">
                        <div id="content-${msgId}" class="prose prose-invert max-w-none break-words w-full"></div>
                    </div>
                </div>`;
            }
            container.insertAdjacentHTML('beforeend', html);
            
            if(role !== 'user') {
                const contentDiv = document.getElementById(`content-${msgId}`);
                contentDiv.innerHTML = DOMPurify.sanitize(marked.parse(content), { ADD_TAGS: ['code', 'pre', 'span'], ADD_ATTR: ['class'] });
                postProcessMessage(contentDiv, content, msgId);
            }

            lucide.createIcons();
            if (animate) setTimeout(scrollToBottom, 50);
        }

        function postProcessMessage(containerEl, rawText, msgId) {
            const preElements = containerEl.querySelectorAll('pre');
            const codeBlocksData = []; 
            
            preElements.forEach((pre) => {
                const codeBlock = pre.querySelector('code');
                if (codeBlock) {
                    const langMatch = codeBlock.className.match(/language-([a-zA-Z0-9-]+)/);
                    const lang = langMatch ? langMatch[1] : 'text';
                    const rawCode = codeBlock.textContent || codeBlock.innerText;
                    codeBlocksData.push(rawCode); 

                    const b64Code = encodeURIComponent(rawCode);
                    const wrapper = document.createElement('div');
                    wrapper.className = 'code-block-wrapper';
                    wrapper.innerHTML = `
                        <div class="code-header">
                            <span>${lang.toUpperCase()}</span>
                            <button class="copy-btn" onclick="copyCodeText(this, '${b64Code.replace(/'/g, "\\'")}')">
                                <i data-lucide="copy" class="w-3.5 h-3.5"></i> Salin
                            </button>
                        </div>
                    `;
                    wrapper.appendChild(pre.cloneNode(true));
                    pre.parentNode.replaceChild(wrapper, pre);
                }
            });

            // Ekstraksi File Multi-Blok
            const fileRegex = /\[FILE:\s*([a-zA-Z0-9_.-]+)\]/gi;
            const filesFound = [];
            let match;
            while ((match = fileRegex.exec(rawText)) !== null) filesFound.push(match[1]);

            if (filesFound.length > 0) {
                const uniqueFiles = [...new Set(filesFound)];
                let attachmentsHTML = '<div class="mt-6 space-y-3 border-t border-white/10 pt-4">';
                
                uniqueFiles.forEach((filename, i) => {
                    // Petakan file berdasarkan urutan blok kode. Jika jumlah file > jumlah blok, gunakan blok terakhir.
                    let targetCodeRaw = codeBlocksData.length > 0 ? codeBlocksData[Math.min(i, codeBlocksData.length - 1)] : "// Kode tidak ditemukan dalam blok.";
                    const safeEncodedCode = encodeURIComponent(targetCodeRaw);

                    attachmentsHTML += `
                        <div class="download-box" onclick="triggerRealDownload('${filename}', '${safeEncodedCode.replace(/'/g, "\\'")}')">
                            <div class="flex items-center gap-4">
                                <div class="p-2.5 bg-gradient-to-br from-primary to-purple-700 rounded-xl shadow-lg text-white"><i data-lucide="download-cloud" class="w-5 h-5"></i></div>
                                <div class="flex flex-col">
                                    <span class="font-semibold text-white text-sm tracking-wide">${filename}</span>
                                    <span class="text-[10px] text-gray-400 mt-0.5">Ketuk untuk Mengunduh File Kode Ini</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
                attachmentsHTML += '</div>';
                containerEl.insertAdjacentHTML('beforeend', attachmentsHTML);
            }
            lucide.createIcons();
        }

        // --- UTILS ---
        function escapeHtml(unsafe) {
            return unsafe.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        function copyCodeText(btn, encodedCode) {
            const code = decodeURIComponent(encodedCode);
            navigator.clipboard.writeText(code).then(() => {
                const originalHtml = btn.innerHTML;
                btn.innerHTML = `<i data-lucide="check" class="w-3.5 h-3.5 text-green-400"></i> <span class="text-green-400">Tersalin</span>`;
                lucide.createIcons();
                setTimeout(() => { btn.innerHTML = originalHtml; lucide.createIcons(); }, 2000);
            }).catch(err => fallbackCopyTextToClipboard(code, btn));
        }

        function fallbackCopyTextToClipboard(text, btn) {
            const ta = document.createElement("textarea");
            ta.value = text; ta.style.position = "fixed";
            document.body.appendChild(ta); ta.select();
            try {
                if (document.execCommand('copy')) {
                    const originalHtml = btn.innerHTML;
                    btn.innerHTML = `<i data-lucide="check" class="w-3.5 h-3.5 text-green-400"></i> <span class="text-green-400">Tersalin</span>`;
                    lucide.createIcons();
                    setTimeout(() => { btn.innerHTML = originalHtml; lucide.createIcons(); }, 2000);
                }
            } catch (err) {}
            document.body.removeChild(ta);
        }

        function triggerRealDownload(filename, encodedCode) {
            try {
                const codeContent = decodeURIComponent(encodedCode);
                const dataUri = 'data:application/octet-stream;charset=utf-8,' + encodeURIComponent(codeContent);
                const a = document.createElement('a');
                a.href = dataUri;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            } catch (error) {
                alert("Sistem WebView memblokir unduhan langsung. Silakan gunakan tombol SALIN pada blok kode.");
            }
        }
    </script>
